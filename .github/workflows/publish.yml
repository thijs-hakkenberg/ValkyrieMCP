name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 10.9.1 (required for OIDC trusted publishing)
        run: |
          echo "Bundled npm: $(npm --version)"
          npm install -g npm@latest
          echo "Updated npm: $(npm --version)"

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm publish --provenance --access public
